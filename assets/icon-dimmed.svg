<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="512" height="512" fill="#1A1A2E"/>

    <!-- Radar rings — concentric arcs from center-bottom, dimmed -->
    <circle cx="256" cy="384" r="100" fill="none" stroke="#6B7B8D" stroke-width="2" stroke-opacity="0.08"/>
    <circle cx="256" cy="384" r="170" fill="none" stroke="#6B7B8D" stroke-width="2" stroke-opacity="0.12"/>
    <circle cx="256" cy="384" r="240" fill="none" stroke="#6B7B8D" stroke-width="2" stroke-opacity="0.16"/>
    <circle cx="256" cy="384" r="310" fill="none" stroke="#6B7B8D" stroke-width="2.5" stroke-opacity="0.2"/>

    <!-- Antenna / mast — vertical line from center bottom, dimmed -->
    <line x1="256" y1="384" x2="256" y2="148" stroke="#6B7B8D" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4"/>

    <!-- Antenna tip — small diamond, dimmed -->
    <polygon points="256,132 264,148 256,164 248,148" fill="#6B7B8D" fill-opacity="0.4"/>

    <!-- Signal dots — inactive, dimmed -->
    <circle cx="172" cy="248" r="8" fill="#6B7B8D" fill-opacity="0.25"/>
    <circle cx="340" cy="248" r="8" fill="#6B7B8D" fill-opacity="0.25"/>
    <circle cx="256" cy="196" r="8" fill="#6B7B8D" fill-opacity="0.25"/>

    <!-- Port number colon motif — dimmed -->
    <rect x="132" y="320" width="6" height="6" rx="1" fill="#6B7B8D" fill-opacity="0.2"/>
    <rect x="132" y="332" width="6" height="6" rx="1" fill="#6B7B8D" fill-opacity="0.2"/>

    <rect x="374" y="320" width="6" height="6" rx="1" fill="#6B7B8D" fill-opacity="0.2"/>
    <rect x="374" y="332" width="6" height="6" rx="1" fill="#6B7B8D" fill-opacity="0.2"/>

    <!-- Subtle crosshair lines, dimmed -->
    <line x1="196" y1="384" x2="316" y2="384" stroke="#6B7B8D" stroke-width="1.5" stroke-opacity="0.1"/>
  </g>
</svg>