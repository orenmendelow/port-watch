<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="#0F0F1A"/>

    <!-- Large bold antenna mast -->
    <rect x="244" y="160" width="24" height="200" rx="12" fill="#4FC3F7"/>

    <!-- Antenna base plate -->
    <rect x="206" y="340" width="100" height="20" rx="10" fill="#4FC3F7"/>

    <!-- Signal waves — thick, bold arcs -->
    <!-- Left waves -->
    <path d="M 220 220 A 60 60 0 0 0 220 300" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-opacity="0.9"/>
    <path d="M 180 190 A 110 110 0 0 0 180 330" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M 140 164 A 160 160 0 0 0 140 356" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-opacity="0.3"/>

    <!-- Right waves -->
    <path d="M 292 220 A 60 60 0 0 1 292 300" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-opacity="0.9"/>
    <path d="M 332 190 A 110 110 0 0 1 332 330" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M 372 164 A 160 160 0 0 1 372 356" fill="none" stroke="#4FC3F7" stroke-width="14" stroke-linecap="round" stroke-opacity="0.3"/>

    <!-- Antenna tip dot -->
    <circle cx="256" cy="148" r="18" fill="#4FC3F7"/>
  </g>
</svg>
